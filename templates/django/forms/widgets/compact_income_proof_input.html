{% if widget.is_initial %}
<div class="mb-2 p-2 border rounded bg-light d-flex align-items-center justify-content-between">
    <div>
        <span class="text-secondary small">{{ widget.initial_text }}:</span>
        <a href="{{ widget.value.url }}" class="fw-bold text-decoration-none ms-1" target="_blank">
            <i class="bi bi-file-earmark-text"></i> {{ widget.display_name|default:widget.value|truncatechars:30 }}
        </a>
    </div>
    {% if not widget.required %}
    <div class="form-check m-0">
        <input class="form-check-input" type="checkbox" name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}"{% if widget.attrs.disabled %} disabled{% endif %}>
        <label class="form-check-label small text-danger" for="{{ widget.checkbox_id }}">
            {{ widget.clear_checkbox_label }}
        </label>
    </div>
    {% endif %}
</div>
<div class="small text-secondary mb-1 fw-medium">{{ widget.input_text }}:</div>
{% endif %}
<input type="{{ widget.type }}" name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>
