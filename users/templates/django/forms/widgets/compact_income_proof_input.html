<div class="income-proof-widget">
    {% if widget.is_initial %}
        <div class="current-document-card">
            <div class="current-document-meta">
                <span class="current-document-label">{{ widget.initial_text }}</span>
                <a
                    href="{{ widget.value.url }}"
                    class="current-document-link"
                    target="_blank"
                    rel="noopener"
                >
                    {{ widget.display_name|default:widget.value }}
                </a>
            </div>
            {% if not widget.required %}
                <div class="current-document-clear">
                    <input
                        type="checkbox"
                        name="{{ widget.checkbox_name }}"
                        id="{{ widget.checkbox_id }}"
                        {% if widget.attrs.disabled %} disabled{% endif %}
                        {% if widget.attrs.checked %} checked{% endif %}
                    >
                    <label for="{{ widget.checkbox_id }}">{{ widget.clear_checkbox_label }}</label>
                </div>
            {% endif %}
        </div>
    {% endif %}

    {% if widget.is_initial %}
        <label class="document-upload-label" for="{{ widget.attrs.id }}">{{ widget.input_text }}</label>
    {% endif %}
    <input type="{{ widget.type }}" name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>
</div>
